<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHub | Hire & Get Hired</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="glass-header p-6 rounded-3xl mb-10 flex justify-between items-center shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-700 tracking-tight">
                <i class="fa-solid fa-briefcase mr-2"></i>Job<span class="text-slate-800">Hub</span>
            </h1>
            <span class="bg-indigo-100 text-indigo-600 px-4 py-1 rounded-full text-sm font-bold">Admin Dashboard</span>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="glass-card p-6 rounded-3xl sticky top-8">
                    <h2 class="text-xl font-bold mb-6 text-slate-800">Post a New Job</h2>
                    <form id="job-form" class="space-y-4">
                        <input type="text" id="company" placeholder="Company Name" required class="form-input">
                        <input type="text" id="title" placeholder="Job Title" required class="form-input">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="salary" placeholder="Salary (e.g. 8 LPA)" required class="form-input">
                            <input type="text" id="location" placeholder="Location" required class="form-input">
                        </div>
                        <input type="text" id="skills" placeholder="Skills (Java, Python, etc.)" required class="form-input">
                        <textarea id="description" placeholder="Job Description" rows="3" required class="form-input"></textarea>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                            List Job Now
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="job-list" class="grid gap-6">
                    </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
